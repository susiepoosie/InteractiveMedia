<!DOCTYPE html>
<html>
<head>
    <title>Contents of student's bag</title>
    <style>
        body{
            background-image: url(media/contents-bg.jpg)
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            /* You can set this to whatever you wish. */
            width: 100%;
            
            /* You'll need to set a height. */
            height: 100%;
            
            /* Allows positioning relative to this container. */
            position: relative;
        }
        img{
            height: 300px;
        }
        .draggable{
            position: absolute;
        }
        .draggable#bottle{
            bottom: 20vh;
            left: 25vw;
        }
        .draggable#laptop{
            bottom: 25vh;
            right: 30vw;
        }
        .draggable#white{
            bottom: 30vh;
            right: 10vw;
        }
        .draggable#pencilcase{
            top: 10vh;
            right: 30vw;
        }
    </style>
</head>
<body>
    <a href="index.html">I'm done, let's put everything back...</a>
    <div class="container">
        <div class="draggable" id="bottle">
            <img src="media/bottle.png" alt="bottle">
        </div>
        <div class="draggable" id="pencilcase">
            <img src="media/pencil-case.png" alt="pencilcase">
        </div>
        <div class="draggable" id="white">
            <img src="media/notebook_whitr.png" alt="white notebook">
        </div>
        <div class="draggable" id="laptop">
            <img src="media/laptop.png" alt="laptop">
        </div>
        <div id="calculator">
            <a href="week-1.html"><img src="media/calculator.png" alt="calculator"></a>
        </div>
        <div class="item" id="black">
            <a href="week-2.html"><img src="media/notebook_black.png" alt="calculator"></a>
        </div>
        <div id="face">
            <a href="week-3.html"><img src="media/face.png" alt="Reusable shopping bag"></a>
        </div>
    </div>
    <script>
        // Get all the elements with class name "draggable":
        var draggableElements = document.getElementsByClassName("draggable");
        
        // Apply dragElement function to each draggable element:
        for (var i = 0; i < draggableElements.length; i++) {
        dragElement(draggableElements[i]);
        }
        
        function dragElement(elmnt) {
        var pos1 = 0,
            pos2 = 0,
            pos3 = 0,
            pos4 = 0;
        if (elmnt.getElementsByClassName(elmnt.className)[0]) {
            elmnt.getElementsByClassName(elmnt.className)[0].onmousedown =
            dragMouseDown;
        } else {
            // move the DIV from anywhere inside the DIV:
            elmnt.onmousedown = dragMouseDown;
        }
        
        function dragMouseDown(e) {
            e = e || window.event;
            e.preventDefault();
            // get the mouse cursor position at startup:
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            // call a function whenever the cursor moves:
            document.onmousemove = elementDrag;
        }
        
        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            // calculate the new cursor position:
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            // set the element's new position:
            elmnt.style.top = elmnt.offsetTop - pos2 + "px";
            elmnt.style.left = elmnt.offsetLeft - pos1 + "px";
        }
        
        function closeDragElement() {
            // stop moving when mouse button is released:
            document.onmouseup = null;
            document.onmousemove = null;
        }
        }
    </script>
</body>
</html>
